<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEDU - Forum Thread</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0a1e3d;
            --secondary-red: #8b1a1a;
            --accent-blue: #1e3a8a;
            --light-bg: #ffffff;
            --light-bg-alt: #f8f9fa;
            --text-dark: #1a1a1a;
            --text-gray: #666666;
            --border-light: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--light-bg-alt);
            color: var(--text-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: var(--light-bg);
            border-bottom: 3px solid var(--secondary-red);
            padding: 1rem 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-size: 0.96rem;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: 1px;
        }

        .btn-logout {
            background: var(--secondary-red);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: #6b1414;
        }

        .container-main {
            padding: 2rem 0;
        }

        .breadcrumb-nav {
            background: var(--light-bg);
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .breadcrumb-nav a {
            color: var(--secondary-red);
            text-decoration: none;
            cursor: pointer;
        }

        .breadcrumb-nav a:hover {
            text-decoration: underline;
        }

        .thread-header {
            background: var(--light-bg);
            padding: 2rem;
            border-radius: 10px;
            border-left: 4px solid var(--secondary-red);
            margin-bottom: 2rem;
        }

        .thread-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-blue);
            margin-bottom: 1rem;
        }

        .thread-meta {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            color: var(--text-gray);
            flex-wrap: wrap;
        }

        .thread-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .posts-section {
            background: var(--light-bg);
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .post {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 1rem;
        }

        .post:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .post-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--primary-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .post-content-wrapper {
            flex: 1;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .post-author {
            font-weight: 700;
            color: var(--primary-blue);
        }

        .post-author-type {
            display: inline-block;
            background: var(--secondary-red);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .post-date {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .post-body {
            line-height: 1.6;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        .post-actions {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-gray);
            transition: 0.3s;
        }

        .post-action:hover {
            color: var(--secondary-red);
        }

        .reply-form {
            background: var(--light-bg-alt);
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 2rem;
        }

        .reply-form h3 {
            color: var(--primary-blue);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        textarea {
            border: 2px solid var(--border-light);
            border-radius: 5px;
            padding: 1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
        }

        textarea:focus {
            border-color: var(--secondary-red);
            box-shadow: 0 0 10px rgba(139, 26, 26, 0.2);
            outline: none;
        }

        .btn-post {
            background: linear-gradient(135deg, var(--secondary-red), #a01515);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .btn-post:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 26, 26, 0.3);
        }

        .message {
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            border-left: 4px solid #28a745;
        }

        .message.error {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border-left: 4px solid #dc3545;
        }

        .no-posts {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-gray);
        }

        .no-posts i {
            font-size: 3rem;
            color: var(--border-light);
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .thread-title {
                font-size: 1.5rem;
            }
            .thread-meta {
                gap: 1rem;
            }
            .post {
                gap: 1rem;
            }
        }

        /* Dark Theme */
        body.dark-theme {
            background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
            color: #e0e0e0;
        }

        body.dark-theme .navbar {
            background: #222;
            border-bottom-color: #333;
        }

        body.dark-theme .thread-container {
            background: #222;
        }

        body.dark-theme .post {
            background: #1a1a1a;
            border-color: #333;
        }

        body.dark-theme .reply-form {
            background: #222;
            border-color: #333;
        }

        body.dark-theme textarea {
            background: #1a1a1a;
            border-color: #444;
            color: #e0e0e0;
        }

        body.dark-theme textarea:focus {
            border-color: var(--primary-blue);
            background: #1a1a1a;
            color: #e0e0e0;
        }

        body.dark-theme .btn-post {
            background: var(--primary-blue);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container-lg">
            <a class="navbar-brand" href="/"><i class="fas fa-graduation-cap"></i> ZEDU</a>
            <div>
                <a href="/forums" class="btn btn-sm" style="background: var(--primary-blue); color: white; margin-right: 0.5rem;">
                    <i class="fas fa-arrow-left"></i> Back to Forums
                </a>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-main">
        <div class="container-lg">
            <!-- Breadcrumb -->
            <div class="breadcrumb-nav">
                <a onclick="window.location.href='/forums'"><i class="fas fa-home"></i> Forums</a>
                <span> / Thread</span>
            </div>

            <!-- Message Container -->
            <div id="messageContainer"></div>

            <!-- Thread Header -->
            <div class="thread-header">
                <h1 class="thread-title" id="threadTitle">Loading...</h1>
                <div class="thread-meta">
                    <div class="thread-meta-item">
                        <i class="fas fa-user"></i>
                        <span id="threadAuthor">Unknown</span>
                    </div>
                    <div class="thread-meta-item">
                        <i class="fas fa-calendar"></i>
                        <span id="threadDate">Just now</span>
                    </div>
                    <div class="thread-meta-item">
                        <i class="fas fa-eye"></i>
                        <span id="threadViews">0 views</span>
                    </div>
                </div>
            </div>

            <!-- Posts Section -->
            <div class="posts-section">
                <h3 style="color: var(--primary-blue); font-weight: 700; margin-bottom: 1.5rem;">
                    <i class="fas fa-comments"></i> Responses
                </h3>
                <div id="postsList">
                    <div class="no-posts">
                        <i class="fas fa-inbox"></i>
                        <p>Loading responses...</p>
                    </div>
                </div>
            </div>

            <!-- Reply Form -->
            <div class="reply-form">
                <h3><i class="fas fa-pen-fancy"></i> Share Your Response</h3>
                <form id="replyForm">
                    <textarea id="replyContent" placeholder="Write your response here... (Be respectful and helpful!)" required></textarea>
                    <button type="submit" class="btn-post">Post Response</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load theme preference
        function loadThemePreference() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            } else if (theme === 'auto') {
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.body.classList.add('dark-theme');
                }
            } else {
                document.body.classList.remove('dark-theme');
            }
        }

        // Get thread ID from URL path
        const pathParts = window.location.pathname.split('/');
        const threadId = pathParts[pathParts.length - 1];

        document.addEventListener('DOMContentLoaded', function() {
            loadThemePreference();
            if (!threadId || isNaN(threadId)) {
                showMessage('Thread not found', 'error');
                return;
            }
            loadThreadPosts();
        });

        function loadThreadPosts() {
            fetch(`/api/thread/${threadId}/posts`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayPosts(data.posts);
                    } else {
                        showMessage(data.message || 'Failed to load posts', 'error');
                    }
                })
                .catch(error => {
                    showMessage('Error: ' + error.message, 'error');
                });
        }

        function displayPosts(posts) {
            const container = document.getElementById('postsList');
            
            if (!posts || posts.length === 0) {
                container.innerHTML = `
                    <div class="no-posts">
                        <i class="fas fa-comments"></i>
                        <p>No responses yet</p>
                        <p style="font-size: 0.9rem;">Be the first to respond!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map((post, index) => {
                const initials = post.full_name.split(' ').map(n => n[0]).join('').substring(0, 2);
                const isSolution = post.is_solution ? '<i class="fas fa-check-circle" style="color: var(--success-green);"></i> Solution' : '';
                
                return `
                    <div class="post">
                        <div class="post-avatar">${initials}</div>
                        <div class="post-content-wrapper">
                            <div class="post-header">
                                <div>
                                    <span class="post-author">${post.full_name}</span>
                                    <span class="post-author-type">${post.user_type}</span>
                                </div>
                                <div class="post-date">${formatDate(post.created_at)}</div>
                            </div>
                            <div class="post-body">${escapeHtml(post.content)}</div>
                            <div class="post-actions">
                                <div class="post-action" onclick="likePost(${post.id}, this)">
                                    <i class="far fa-heart"></i>
                                    <span id="like-${post.id}">${post.likes || 0}</span>
                                </div>
                                ${isSolution ? '<div class="post-action" style="color: var(--success-green);">' + isSolution + '</div>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('replyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const content = document.getElementById('replyContent').value;
            
            if (!content.trim()) {
                showMessage('Please enter a response', 'error');
                return;
            }

            try {
                const response = await fetch(`/api/thread/${threadId}/post`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });

                const data = await response.json();
                if (data.success) {
                    showMessage('Response posted successfully!', 'success');
                    document.getElementById('replyForm').reset();
                    loadThreadPosts();
                } else {
                    showMessage(data.message || 'Failed to post response', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        });

        function likePost(postId, element) {
            const likeCount = element.querySelector('span');
            likeCount.textContent = parseInt(likeCount.textContent) + 1;
            element.style.color = 'var(--secondary-red)';
            element.style.pointerEvents = 'none';
        }

        function formatDate(dateString) {
            if (!dateString) return 'Just now';
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return diffMins + 'm ago';
            
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return diffHours + 'h ago';
            
            const diffDays = Math.floor(diffHours / 24);
            if (diffDays < 7) return diffDays + 'd ago';
            
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            const msgId = 'msg-' + Date.now();
            const html = `
                <div id="${msgId}" class="message message-${type}">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                    <span>${message}</span>
                </div>
            `;
            container.innerHTML = html;
            setTimeout(() => {
                const el = document.getElementById(msgId);
                if (el) el.remove();
            }, 4000);
        }

        function logout() {
            fetch('/api/logout', { method: 'POST' })
                .then(() => window.location.href = '/')
                .catch(err => console.error(err));
        }
    </script>
</body>
</html>
