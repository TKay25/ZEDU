<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forums - ZEDU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0d1b2a;
            --primary-dark: #050d15;
            --primary-light: #1a3a52;
            --secondary: #8B2635;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --dark: #0F172A;
            --light: #F8FAFC;
            --gray-100: #F1F5F9;
            --gray-200: #E2E8F0;
            --gray-600: #475569;
            --gray-800: #1E293B;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--light);
            color: var(--gray-800);
        }

        /* Top Navbar */
        .top-navbar {
            background: white;
            padding: 0.8rem 1.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .navbar-brand {
            font-size: 0.96rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .search-box {
            background: var(--gray-100);
            border: none;
            padding: 0.6rem 0.8rem;
            border-radius: 8px;
            width: 300px;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 27, 42, 0.1);
            background: white;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        /* Main Container */
        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            min-height: calc(100vh - 60px);
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border-right: 1px solid var(--gray-200);
            padding: 1.6rem 0;
            overflow-y: auto;
            display: none;
        }

        .nav-section {
            margin-bottom: 2rem;
        }

        .nav-section-title {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gray-600);
            letter-spacing: 0.5px;
            padding: 0 1.2rem;
            margin-bottom: 1rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1.2rem;
            color: var(--gray-600);
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            color: var(--primary);
            background: var(--gray-100);
        }

        .nav-item.active {
            color: var(--primary);
            background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
            border-left: 3px solid var(--primary);
            padding-left: calc(1.2rem - 3px);
        }

        /* Content Area */
        .content-area {
            padding: 1.6rem;
            overflow-y: auto;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.28rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            font-size: 0.95rem;
            color: var(--gray-600);
            margin: 0;
        }

        /* Forums Layout */
        .forums-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
        }

        .forums-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .forum-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.6rem;
            border: 1px solid var(--gray-200);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .forum-card:hover {
            box-shadow: 0 8px 20px rgba(13, 27, 42, 0.1);
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .forum-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }

        .forum-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark);
            margin: 0;
            flex: 1;
        }

        .forum-meta {
            display: flex;
            gap: 1.2rem;
            margin: 0.8rem 0;
            font-size: 0.85rem;
            color: var(--gray-600);
        }

        .forum-description {
            font-size: 0.9rem;
            color: var(--gray-600);
            margin: 0.8rem 0 0 0;
        }

        .badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Thread Thread */
        .thread-item {
            background: white;
            border-radius: var(--radius-md);
            padding: 1rem;
            border: 1px solid var(--gray-200);
            margin-bottom: 0.8rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .thread-item:hover {
            background: var(--gray-100);
            border-color: var(--primary);
        }

        .thread-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
        }

        .thread-info {
            flex: 1;
        }

        .thread-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--dark);
            margin: 0 0 0.3rem 0;
        }

        .thread-author {
            font-size: 0.8rem;
            color: var(--gray-600);
            margin: 0;
        }

        .thread-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--gray-600);
            margin-top: 0.5rem;
        }

        /* Sidebar */
        .forums-sidebar {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.6rem;
            border: 1px solid var(--gray-200);
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .sidebar-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 1rem;
        }

        .sidebar-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sidebar-item:hover {
            background: var(--primary);
            color: white;
        }

        .create-thread-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 0.8rem 1.6rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(13, 27, 42, 0.2);
            margin-bottom: 1.2rem;
        }

        .create-thread-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(13, 27, 42, 0.3);
            color: white;
            text-decoration: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--gray-600);
        }

        .empty-state-icon {
            font-size: 3rem;
            color: var(--gray-200);
            margin-bottom: 1rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .forums-container {
                grid-template-columns: 1fr;
            }

            .forums-sidebar {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .content-area {
                padding: 0.8rem;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .search-box {
                width: 200px;
            }
        }

        /* Dark Theme */
        body.dark-theme {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }

        body.dark-theme .top-navbar {
            background: #222;
            border-bottom-color: #333;
        }

        body.dark-theme .search-box {
            background: #333;
            color: #e0e0e0;
        }

        body.dark-theme .search-box:focus {
            background: #2a2a2a;
        }

        body.dark-theme .thread-card {
            background: #222;
            border-color: #333;
        }

        body.dark-theme .thread-card:hover {
            background: #2a2a2a;
        }

        body.dark-theme .page-title {
            color: #e8f4f8;
        }

        body.dark-theme .navbar-actions a {
            color: #999;
        }

        body.dark-theme .navbar-actions a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <!-- Top Navbar -->
    <div class="top-navbar">
        <div class="navbar-brand">
            <i class="fas fa-graduation-cap"></i> ZEDU
        </div>
        <div class="navbar-actions">
            <input type="text" class="search-box" placeholder="Search discussions...">
            
            <!-- Navigation Links -->
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <a href="/dashboard" style="text-decoration: none; color: var(--gray-600); font-weight: 600; font-size: 0.9rem; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.3s ease;" onmouseover="this.style.background='var(--gray-100)'; this.style.color='var(--primary)'" onmouseout="this.style.background='transparent'; this.style.color='var(--gray-600)'">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
                <a href="/forums" style="text-decoration: none; color: var(--primary); font-weight: 600; font-size: 0.9rem; padding: 0.5rem 1rem; border-radius: 8px; background: var(--gray-100);">
                    <i class="fas fa-comments"></i> Forums
                </a>
                <a href="/account" style="text-decoration: none; color: var(--gray-600); font-weight: 600; font-size: 0.9rem; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.3s ease;" onmouseover="this.style.background='var(--gray-100)'; this.style.color='var(--primary)'" onmouseout="this.style.background='transparent'; this.style.color='var(--gray-600)'">
                    <i class="fas fa-user-circle"></i> Account
                </a>
                <a href="/settings" style="text-decoration: none; color: var(--gray-600); font-weight: 600; font-size: 0.9rem; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.3s ease;" onmouseover="this.style.background='var(--gray-100)'; this.style.color='var(--primary)'" onmouseout="this.style.background='transparent'; this.style.color='var(--gray-600)'">
                    <i class="fas fa-cog"></i> Settings
                </a>
                <a href="#" id="logoutBtn" style="text-decoration: none; color: var(--gray-600); font-weight: 600; font-size: 0.9rem; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.3s ease;" onmouseover="this.style.background='var(--gray-100)'; this.style.color='var(--danger)'" onmouseout="this.style.background='transparent'; this.style.color='var(--gray-600)'">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>

            <div class="avatar" id="userInitials">ZV</div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar Navigation -->
        <!-- Content Area -->
        <div class="content-area">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">💬 Discussion Forums</h1>
                <p class="page-subtitle">Connect with other learners, ask questions, and share knowledge</p>
            </div>

            <!-- Forums Grid -->
            <div class="forums-container">
                <!-- Forums List - Dynamic -->
                <div class="forums-list" id="forumsList">
                    <!-- Forums will be loaded dynamically from backend -->
                    <div style="text-align: center; padding: 2rem;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-right: 1rem;"></i>
                        <p>Loading forums...</p>
                    </div>
                </div>

                <!-- Right Sidebar -->
                <div class="forums-sidebar">
                    <button class="create-thread-btn" onclick="openThreadModal('global')">
                        <i class="fas fa-plus"></i> New Discussion
                    </button>

                    <div class="sidebar-title">Popular Tags</div>
                    <div id="popularTagsContainer">
                        <div class="sidebar-item" style="text-align: center;">
                            <i class="fas fa-spinner fa-spin"></i> Loading tags...
                        </div>
                    </div>

                    <div style="margin-top: 1.6rem; padding: 1rem; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); border-radius: var(--radius-md); color: white;">
                        <p style="font-weight: 600; margin: 0 0 0.5rem 0;">Community Guidelines</p>
                        <p style="font-size: 0.8rem; margin: 0; opacity: 0.9;">Be respectful, helpful, and constructive in all interactions</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Discussion Modal -->
    <div class="modal fade" id="threadModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <i class="fas fa-comments" style="font-size: 1.2rem; color: var(--secondary);"></i>
                        <h5 class="modal-title" style="margin: 0;">Start New Discussion</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="threadForm">
                        <div class="mb-3">
                            <label class="form-label">Discussion Title</label>
                            <input type="text" class="form-control" id="threadTitle" placeholder="e.g., How to solve quadratic equations?" required>
                        </div>
                        <button type="submit" class="btn" style="background: var(--secondary); color: white;">Create Discussion</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        });

        // Fetch user profile
        async function loadProfile() {
            try {
                const response = await fetch('/api/profile');
                const data = await response.json();
                if (data.success) {
                    const user = data.user;
                    document.getElementById('userInitials').textContent = 
                        user.full_name.split(' ').map(n => n[0]).join('').toUpperCase();
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        // Load theme preference
        function loadThemePreference() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            } else if (theme === 'auto') {
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.body.classList.add('dark-theme');
                }
            } else {
                document.body.classList.remove('dark-theme');
            }
        }

        // Load data on page load
        window.addEventListener('load', () => {
            loadThemePreference();
            loadProfile();
            initializeThreadModal();
        });

        // Initialize thread modal
        let threadModal;
        let currentForumId = null;

        function initializeThreadModal() {
            threadModal = new bootstrap.Modal(document.getElementById('threadModal'));
            document.getElementById('threadForm').addEventListener('submit', createThread);
        }

        function openThreadModal(forumId = 'global') {
            currentForumId = forumId;
            document.getElementById('threadTitle').value = '';
            threadModal.show();
        }

        async function createThread(e) {
            e.preventDefault();
            const title = document.getElementById('threadTitle').value.trim();
            
            if (!title) {
                alert('Please enter a discussion title');
                return;
            }

            try {
                const response = await fetch('/api/forum/thread', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        forum_id: currentForumId === 'global' ? 1 : currentForumId,
                        title: title
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    alert('Discussion created successfully!');
                    threadModal.hide();
                    location.reload(); // Reload to show new thread
                } else {
                    alert('Error creating discussion: ' + data.message);
                }
            } catch (error) {
                console.error('Error creating thread:', error);
                alert('Error creating discussion. Please try again.');
            }
        }

        // Load popular tags dynamically
        async function loadPopularTags() {
            try {
                const response = await fetch('/api/forums/popular-tags');
                const data = await response.json();
                
                if (data.success && data.tags && data.tags.length > 0) {
                    renderPopularTags(data.tags);
                } else {
                    // Fallback to default tags if no tags returned
                    renderPopularTags([
                        { tag: 'python', count: 0 },
                        { tag: 'javascript', count: 0 },
                        { tag: 'databases', count: 0 },
                        { tag: 'web-development', count: 0 },
                        { tag: 'project-help', count: 0 },
                        { tag: 'study-tips', count: 0 }
                    ]);
                }
            } catch (error) {
                console.error('Error loading popular tags:', error);
                // Fallback to default tags
                renderPopularTags([
                    { tag: 'python', count: 0 },
                    { tag: 'javascript', count: 0 },
                    { tag: 'databases', count: 0 },
                    { tag: 'web-development', count: 0 },
                    { tag: 'project-help', count: 0 },
                    { tag: 'study-tips', count: 0 }
                ]);
            }
        }

        // Render popular tags
        function renderPopularTags(tags) {
            const container = document.getElementById('popularTagsContainer');
            container.innerHTML = '';
            
            tags.forEach(tagObj => {
                const tagDiv = document.createElement('div');
                tagDiv.className = 'sidebar-item';
                tagDiv.innerHTML = `#${tagObj.tag}${tagObj.count > 0 ? ` <span style="font-size: 0.75rem; opacity: 0.7;">(${tagObj.count})</span>` : ''}`;
                tagDiv.style.cursor = 'pointer';
                tagDiv.onclick = () => {
                    // Optional: Add search/filter functionality when tag is clicked
                    console.log('Tag clicked:', tagObj.tag);
                };
                container.appendChild(tagDiv);
            });
        }

        // Load forums dynamically
        async function loadForums() {
            try {
                const response = await fetch('/api/forums');
                const data = await response.json();
                
                if (data.success && data.forums && data.forums.length > 0) {
                    renderForums(data.forums);
                } else {
                    // Show message if no forums available
                    document.getElementById('forumsList').innerHTML = `
                        <div style="text-align: center; padding: 2rem;">
                            <p>No forums available at the moment.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading forums:', error);
                document.getElementById('forumsList').innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: red;">
                        <p>Error loading forums. Please try again.</p>
                    </div>
                `;
            }
        }

        // Render forums
        function renderForums(forums) {
            const forumsList = document.getElementById('forumsList');
            forumsList.innerHTML = '';
            
            forums.forEach(forum => {
                const threadCount = forum.thread_count || 0;
                const postCount = forum.post_count || 0;
                const memberCount = forum.member_count || 0;
                const lastActivity = forum.last_activity_time || 'Recently';
                
                const forumCard = document.createElement('div');
                forumCard.className = 'forum-card';
                forumCard.onclick = () => window.location.href = `/forum/${forum.id}`;
                forumCard.innerHTML = `
                    <div class="forum-header">
                        <div>
                            <p class="forum-title">${forum.name}</p>
                            <p class="forum-description">${forum.description || ''}</p>
                        </div>
                        <span class="badge">${threadCount} thread${threadCount !== 1 ? 's' : ''}</span>
                    </div>
                    <div class="forum-meta">
                        <span><i class="fas fa-comments"></i> ${postCount} post${postCount !== 1 ? 's' : ''}</span>
                        <span><i class="fas fa-users"></i> ${memberCount} member${memberCount !== 1 ? 's' : ''}</span>
                        <span><i class="fas fa-clock"></i> ${lastActivity}</span>
                    </div>
                `;
                forumsList.appendChild(forumCard);
            });
        }

        // Load forums on page load
        window.addEventListener('load', () => {
            loadThemePreference();
            loadProfile();
            initializeThreadModal();
            loadForums();
            loadPopularTags();
        });
    </script>
</body>
</html>
